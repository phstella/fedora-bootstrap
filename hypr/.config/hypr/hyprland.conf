# =======================================================================================
#  SIMPLE HyDE-STYLE HYPRLAND CONFIG (Fixed for v0.51+)
#  Based on HyDE Project (https://github.com/HyDE-Project/HyDE)
#  Consolidated into a single file.
# =======================================================================================

# --- MONITORS ---
monitor=,preferred,auto,1

# --- AUTOSTART ---
exec-once = /usr/lib/polkit-kde-authentication-agent-1 # Polkit agent
# exec-once = dunst # Notification daemon
exec-once = qs -c noctalia-shell
exec-once = hyprpaper # Wallpaper daemon
# Clipboard watch handled by noctalia-shell's Launcher settings
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

# --- ENVIRONMENT VARIABLES ---
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,Adwaita:dark
env = ADW_DISABLE_PORTAL,1
# env = XDG_MENU_PREFIX,arch- # Removed: Arch-specific
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/ssh-agent.socket

# --- INPUT ---
input {
    kb_layout = us
    kb_variant = intl
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0
}

# --- GENERAL ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # HyDE Signature Colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

# --- DECORATION (UPDATED) ---
decoration {
    rounding = 10
    
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    # NEW SHADOW SYNTAX (Fixes lines 77-80)
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    
    dim_inactive = false
    dim_strength = 0.1
}

# --- ANIMATIONS ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

# --- LAYOUTS ---
dwindle {
    pseudotile = yes 
    preserve_split = yes 
}

master {
    new_status = master
}

# --- GESTURES (UPDATED) ---
gestures {
    # NEW GESTURE SYNTAX (Fixes line 124)
    # The old 'workspace_swipe = on/off' is removed.
    # To enable default 3-finger swipe:
    # workspace_swipe = true # REMOVED
}

# =======================================================================================
#  CLEANED HYDE-STYLE KEYBINDINGS
# =======================================================================================
$mainMod = SUPER

# --- APPLICATIONS ---
bind = $mainMod, T, exec, kitty              # Terminal (Changed from Q to T)
bind = $mainMod, E, exec, dolphin            # File Manager
bind = $mainMod, B, exec, firefox            # Browser
bind = $mainMod, A, exec, qs -c noctalia-shell ipc call launcher toggle    # App Launcher (Noctalia)
bind = $mainMod, V, exec, qs -c noctalia-shell ipc call launcher clipboard # Clipboard History

# --- WINDOW MANAGEMENT (System) ---
bind = $mainMod, Q, killactive,              # Close window
bind = Alt, F4, killactive,                  # Close window (Alternative)
bind = $mainMod, Delete, exit,               # Logout / Kill Hyprland
bind = $mainMod, W, togglefloating,          # Toggle Floating
bind = $mainMod, G, togglegroup,             # Toggle Group Mode
bind = $mainMod, F, fullscreen,              # Toggle Fullscreen
bind = $mainMod, L, exec, hyprlock           # Lock Screen
bind = $mainMod Shift, F, pin,               # Pin Window (Visible on all workspaces)

# Layout Toggles (Dwindle specific)
bind = $mainMod, J, togglesplit, 

# --- SCREENSHOTS ---
bind = $mainMod, P, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png | wl-copy --type image/png # Region: save + clipboard
bind = $mainMod SHIFT, P, exec, grim - | tee ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png | wl-copy --type image/png    # Full: save + clipboard
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy                                              # Region to clipboard
bind = SHIFT, Print, exec, grim - | wl-copy                                                       # Full screen to clipboard

# --- MEDIA / FN KEYS ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

# --- MOUSE ACTIONS ---
# Standard Click & Drag
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# HyDE "Non-Click" Actions (Move mouse after pressing keys)
bindm = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow

# --- FOCUS (Arrow Keys) ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- MOVE WINDOWS (Keyboard: Super+Ctrl+Arrow) ---
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# --- RESIZE WINDOWS (Keyboard: Super+Shift+Arrow) ---
binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10

# --- WORKSPACES ---
# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- WINDOW RULES ---
windowrule {
  name = windowrule-1
  float = on
  match:class = ^(kvantummanager)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^(qt5ct)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^(nwg-look)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = ^(org.kde.ark)$
}

windowrule {
  name = windowrule-5
  float = on
  match:class = ^(pavucontrol)$
}

windowrule {
  name = windowrule-6
  float = on
  match:class = ^(blueman-manager)$
}

windowrule {
  name = windowrule-7
  float = on
  match:class = ^(nm-applet)$
}

windowrule {
  name = windowrule-8
  float = on
  match:class = ^(nm-connection-editor)$
}

windowrule {
  name = windowrule-9
  opacity = 0.90 0.90
  match:class = ^(kitty)$
}
